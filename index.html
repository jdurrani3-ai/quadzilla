<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>GymTrack Pro</title>

  <!-- APP ICON + MANIFEST: Upload app-icon.png and manifest.json alongside index.html in your repo root -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/png" href="./app-icon.png?v=10">
  <link rel="shortcut icon" type="image/png" href="./app-icon.png?v=10">
  <link rel="apple-touch-icon" href="./app-icon.png?v=10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="GymTrack Pro">
  <meta name="theme-color" content="#000000">

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg:#000; --card:#141414; --card2:#1f1f1f; --text:#fff; --muted:#b8b8b8;
      --line:#333; --line2:#555; --btn:#fff; --btnText:#000; --darkBtn:#252525;
    }
    html, body { margin:0; padding:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; min-height:100%; }
    body { display:flex; justify-content:center; }
    #app { width:100%; max-width:460px; min-height:100vh; padding:18px 14px 96px; background:var(--bg); }
    h1,h2,h3,p { margin:0; }
    h1 { font-size:28px; letter-spacing:-.8px; }
    h2 { font-size:22px; margin-bottom:12px; }
    h3 { font-size:16px; margin-bottom:8px; }
    p { color:var(--muted); line-height:1.45; font-size:14px; }
    button,input,select { font:inherit; }
    button { border:none; border-radius:14px; padding:13px 15px; font-weight:800; cursor:pointer; min-height:46px; }
    input,select { width:100%; background:#000; color:#fff; border:1px solid var(--line2); border-radius:12px; padding:13px; outline:none; min-height:46px; }
    input:focus,select:focus { border-color:#fff; }
    .topbar { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:16px; }
    .brand { display:flex; align-items:center; gap:10px; }
    .brandIcon { width:44px; height:44px; border-radius:14px; object-fit:cover; background:#fff; border:1px solid #333; }
    .brandIconFallback { width:44px; height:44px; border-radius:14px; background:#fff; color:#000; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:900; }
    .date { color:var(--muted); font-size:13px; margin-top:4px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:22px; padding:16px; margin-bottom:12px; }
    .card.tight { padding:13px; }
    .row { display:flex; align-items:center; gap:10px; }
    .row.between { justify-content:space-between; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    /* FIX Bug 4: was "grid-template-columns:1fr 1fr" (2 cols) — renamed to grid5 to match actual usage (5 protein buttons) */
    .grid5 { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; }
    @media(max-width:360px){ .grid5 { grid-template-columns:repeat(3,1fr); } }
    .primary { background:var(--btn); color:var(--btnText); }
    .secondary { background:var(--darkBtn); color:var(--text); border:1px solid var(--line2); }
    .ghost { background:transparent; color:var(--text); border:1px solid var(--line2); }
    .smallbtn { padding:9px 11px; min-height:38px; font-size:13px; border-radius:12px; }
    .pillbar { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px; margin-bottom:10px; }
    .pill { flex:0 0 auto; background:#171717; color:#fff; border:1px solid var(--line); border-radius:999px; padding:11px 14px; font-weight:800; white-space:nowrap; }
    .pill.active { background:#fff; color:#000; border-color:#fff; }
    .progress { width:100%; height:10px; background:#222; border-radius:999px; overflow:hidden; border:1px solid #333; margin-top:10px; }
    .bar { height:100%; background:#fff; width:0%; transition:width .25s ease; }
    .bigNumber { font-size:42px; font-weight:900; letter-spacing:-1px; }
    .statNumber { font-size:28px; font-weight:900; margin-bottom:4px; }
    .nav { position:fixed; left:50%; bottom:0; transform:translateX(-50%); width:100%; max-width:460px; background:rgba(0,0,0,.96); border-top:1px solid var(--line); padding:9px 8px calc(9px + env(safe-area-inset-bottom)); display:grid; grid-template-columns:repeat(5,1fr); gap:6px; z-index:30; }
    .nav button { background:transparent; color:var(--muted); border:1px solid transparent; border-radius:14px; padding:9px 4px; min-height:48px; font-size:12px; font-weight:800; }
    .nav button.active { color:#000; background:#fff; }
    .exerciseCard { background:var(--card); border:1px solid var(--line); border-radius:22px; padding:15px; margin-bottom:12px; }
    .exerciseCard.done { border-color:#fff; }
    .exerciseCard.skipped { opacity:.55; border-color:#222; }
    .exerciseTitle { font-size:18px; font-weight:900; margin-bottom:4px; }
    .exerciseSub { color:var(--muted); font-size:13px; margin-bottom:12px; }
    .difficulty { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin:10px 0; }
    .difficulty button { font-size:12px; padding:9px 5px; min-height:38px; background:#1d1d1d; color:#fff; border:1px solid var(--line); }
    .difficulty button.active { background:#fff; color:#000; }
    /* FIX Bug 3: mood selector variant — 5 emoji buttons need 5 columns, not 4 */
    .mood5 { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; margin:10px 0; }
    .mood5 button { font-size:16px; padding:9px 5px; min-height:38px; background:#1d1d1d; color:#fff; border:1px solid var(--line); border-radius:14px; }
    .mood5 button.active { background:#fff; color:#000; }
    .actions { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px; }
    .modalBackdrop { position:fixed; inset:0; background:rgba(0,0,0,.82); display:none; align-items:flex-end; justify-content:center; z-index:80; }
    .modalBackdrop.show { display:flex; }
    .modal { width:100%; max-width:460px; background:#111; border:1px solid #333; border-radius:24px 24px 0 0; padding:18px; max-height:88vh; overflow-y:auto; }
    .field { margin-bottom:12px; }
    .field label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-weight:800; text-transform:uppercase; letter-spacing:.4px; }
    .toast { position:fixed; left:50%; bottom:88px; transform:translateX(-50%) translateY(20px); background:#fff; color:#000; padding:13px 16px; border-radius:999px; font-weight:900; opacity:0; pointer-events:none; transition:.25s ease; z-index:100; max-width:92%; text-align:center; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .gymOverlay { position:fixed; inset:0; background:#000; color:#fff; z-index:70; display:none; overflow-y:auto; padding:18px 14px 100px; }
    .gymOverlay.show { display:flex; justify-content:center; }
    .gymInner { width:100%; max-width:460px; }
    .exitBtn { position:fixed; top:14px; right:14px; z-index:90; background:#fff; color:#000; border-radius:999px; padding:10px 13px; min-height:40px; }
    .workoutPickerCard { background:#141414; border:1px solid #333; border-radius:22px; padding:18px; margin-bottom:12px; cursor:pointer; }
    .badgeList { display:flex; flex-wrap:wrap; gap:7px; margin-top:8px; }
    .badge { background:#fff; color:#000; border-radius:999px; padding:7px 10px; font-size:12px; font-weight:900; }
    .historyItem { background:#151515; border:1px solid #333; border-radius:18px; padding:13px; margin-bottom:10px; }
    .iconBtn { width:46px; padding:0; display:inline-flex; align-items:center; justify-content:center; }
    .empty { text-align:center; padding:24px 12px; color:var(--muted); }
    .sectionTitle { margin:18px 0 10px; font-size:18px; font-weight:900; }
    @media(max-width:360px){ .difficulty{grid-template-columns:1fr 1fr;} .mood5{grid-template-columns:repeat(5,1fr);} .actions{grid-template-columns:1fr;} h1{font-size:24px;} }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="modalBackdrop" class="modalBackdrop"><div id="modal" class="modal"></div></div>
  <div id="toast" class="toast"></div>
  <div id="gymOverlay" class="gymOverlay"><button class="exitBtn" onclick="App.closeGymMode()">✕ Exit</button><div id="gymInner" class="gymInner"></div></div>

  <script>
    const KEY = "gtp6";
    const ICON_SRC = "/app-icon.png?v=10";
    const todayISO = () => new Date().toISOString().slice(0,10);
    const niceDate = (date = new Date()) => date.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});
    const uid = () => Math.random().toString(36).slice(2,10);

    const defaultState = () => ({
      activeTab:"Home", activeWorkoutId:"w1", planWorkoutId:"w1",
      gymMode:{open:false, selectedWorkoutId:null}, lastActiveDate:todayISO(),
      protein:{today:0, goal:120}, dailyLog:{sleep:"", water:"", bodyWeight:"", cardio:"", mood:""},
      workouts:[
        {id:"w1", name:"Workout 1", exercises:[
          {id:uid(), name:"Bench Press", muscle:"Chest", sets:3, reps:10, weight:45, rest:"90 sec"},
          {id:uid(), name:"Shoulder Press", muscle:"Shoulders", sets:3, reps:10, weight:25, rest:"75 sec"},
          {id:uid(), name:"Tricep Pushdown", muscle:"Triceps", sets:3, reps:12, weight:30, rest:"60 sec"}
        ]},
        {id:"w2", name:"Workout 2", exercises:[
          {id:uid(), name:"Lat Pulldown", muscle:"Back", sets:3, reps:10, weight:50, rest:"90 sec"},
          {id:uid(), name:"Seated Row", muscle:"Back", sets:3, reps:10, weight:45, rest:"75 sec"},
          {id:uid(), name:"Bicep Curl", muscle:"Biceps", sets:3, reps:12, weight:20, rest:"60 sec"}
        ]},
        {id:"w3", name:"Workout 3", exercises:[
          {id:uid(), name:"Leg Press", muscle:"Legs", sets:3, reps:12, weight:90, rest:"90 sec"},
          {id:uid(), name:"Leg Curl", muscle:"Hamstrings", sets:3, reps:12, weight:40, rest:"75 sec"},
          {id:uid(), name:"Calf Raise", muscle:"Calves", sets:3, reps:15, weight:50, rest:"60 sec"}
        ]}
      ],
      checks:{}, history:[], prs:{}
    });

    let state = loadState();

    function loadState(){
      try{
        const saved = localStorage.getItem(KEY);
        if(!saved) return defaultState();
        const parsed = JSON.parse(saved); const fresh = defaultState();
        return {...fresh, ...parsed, protein:{...fresh.protein, ...(parsed.protein||{})}, dailyLog:{...fresh.dailyLog, ...(parsed.dailyLog||{})}, gymMode:{...fresh.gymMode, ...(parsed.gymMode||{})}};
      }catch{return defaultState();}
    }
    function saveState(){ localStorage.setItem(KEY, JSON.stringify(state)); }
    function resetDailyIfNeeded(){
      const today = todayISO();
      if(state.lastActiveDate !== today){
        const lastWeight = state.dailyLog.bodyWeight || "";
        state.checks = {}; state.protein.today = 0;
        state.dailyLog = {sleep:"", water:"", bodyWeight:lastWeight, cardio:"", mood:""};
        state.lastActiveDate = today; saveState();
      }
    }
    function getWorkout(id){ return state.workouts.find(w=>w.id===id) || state.workouts[0]; }
    function getCheck(workoutId, exerciseId){
      if(!state.checks[workoutId]) state.checks[workoutId] = {};
      if(!state.checks[workoutId][exerciseId]) state.checks[workoutId][exerciseId] = {status:"", weight:"", difficulty:""};
      return state.checks[workoutId][exerciseId];
    }
    function setCheck(workoutId, exerciseId, patch){
      const check = getCheck(workoutId, exerciseId);
      state.checks[workoutId][exerciseId] = {...check, ...patch};
      saveState(); render(); if(state.gymMode.open) renderGym();
    }
    function completedCount(workoutId){ const w=getWorkout(workoutId); return w.exercises.filter(ex=>getCheck(workoutId,ex.id).status==="done").length; }
    function skippedCount(workoutId){ const w=getWorkout(workoutId); return w.exercises.filter(ex=>getCheck(workoutId,ex.id).status==="skipped").length; }
    function completionPct(workoutId){ const w=getWorkout(workoutId); return w.exercises.length ? Math.round((completedCount(workoutId)/w.exercises.length)*100) : 0; }
    function lastWeightForExercise(name){
      const hist=[...state.history].sort((a,b)=>new Date(b.date)-new Date(a.date));
      for(const s of hist){ const m=s.exercises.find(ex=>ex.name===name && ex.status==="done" && ex.weight); if(m) return m.weight; }
      return null;
    }
    function musclesForWorkout(w){ const list=[...new Set(w.exercises.map(e=>e.muscle).filter(Boolean))]; return list.length ? list.join(", ") : "No muscle groups yet"; }
    function recoveryScore(){
      let score=0; const sleep=Number(state.dailyLog.sleep||0), water=Number(state.dailyLog.water||0), protein=Number(state.protein.today||0), goal=Number(state.protein.goal||1), mood=state.dailyLog.mood;
      if(sleep>=8) score+=35; else if(sleep>=7) score+=28; else if(sleep>=6) score+=20; else if(sleep>0) score+=10;
      const bw=Number(state.dailyLog.bodyWeight||160); score += Math.round(Math.min(1, water/Math.max(1,Math.round(bw/2))) * 20);
      score += Math.round(Math.min(1, protein/Math.max(1,goal)) * 30);
      if(mood==="🔥") score+=15; else if(mood==="🙂") score+=12; else if(mood==="😐") score+=8; else if(mood==="😕") score+=5; else if(mood==="😩") score+=2;
      return Math.min(100, Math.max(0, score));
    }
    function recoveryText(score){ if(score>=90) return "Great day to push. PR attempt is reasonable if your warm-up feels strong."; if(score>=70) return "Normal workout day. Train normally and avoid ego lifting."; if(score>=50) return "Train, but do not increase weight today."; return "Go light or rest. Recovery is not strong enough today."; }
    function smartTip(){
      const sleep=Number(state.dailyLog.sleep||0), protein=Number(state.protein.today||0), goal=Number(state.protein.goal||1), last=state.history[state.history.length-1];
      if(sleep>0 && sleep<6) return "Sleep is low. Do not increase intensity today.";
      if(protein < goal*.8) return "Protein is behind. Recovery may be limited unless you close the gap.";
      if(last){ const skipped=last.exercises.filter(e=>e.status==="skipped").length, easy=last.exercises.filter(e=>e.difficulty==="Easy").length; if(skipped>0) return "You skipped exercises last session. Repeat them before adding weight."; if(easy>=Math.ceil(last.exercises.length/2)) return "Last session looked easy. Add small weight increases where form was clean."; }
      if(recoveryScore()>=90) return "Recovery is high. Good day to push one lift carefully.";
      return "Start controlled. Focus on clean reps, then decide whether to push.";
    }
    function streakCount(){ const days=new Set(state.history.map(h=>h.date.slice(0,10))); let count=0,d=new Date(); while(days.has(d.toISOString().slice(0,10))){count++; d.setDate(d.getDate()-1);} return count; }
    function sessionsThisWeek(){ const now=new Date(), start=new Date(now); start.setDate(now.getDate()-now.getDay()); start.setHours(0,0,0,0); return state.history.filter(h=>new Date(h.date)>=start).length; }
    function averageProtein(){ if(!state.history.length) return state.protein.today||0; const values=state.history.map(h=>Number(h.protein||0)).filter(n=>!isNaN(n)); values.push(Number(state.protein.today||0)); return Math.round(values.reduce((a,b)=>a+b,0)/values.length); }
    function weeklyReview(){
      const now=new Date(), start=new Date(now); start.setDate(now.getDate()-6); start.setHours(0,0,0,0);
      const week=state.history.filter(h=>new Date(h.date)>=start), sessions=week.length;
      const total=week.reduce((s,h)=>s+h.exercises.length,0), done=week.reduce((s,h)=>s+h.exercises.filter(e=>e.status==="done").length,0), skipped=week.reduce((s,h)=>s+h.exercises.filter(e=>e.status==="skipped").length,0);
      const avgProtein=week.length ? Math.round(week.reduce((s,h)=>s+Number(h.protein||0),0)/week.length) : Number(state.protein.today||0);
      const completion=total ? Math.round(done/total*100) : 0;
      let recommendation="Build consistency first. Save at least one workout to unlock better weekly advice.";
      if(sessions>=3 && completion>=85) recommendation="Strong week. Next step: increase one or two easy lifts by small amounts.";
      else if(sessions>=2 && skipped>2) recommendation="Main issue is skipped work. Reduce volume or repeat missed lifts next week.";
      else if(sessions>=1 && avgProtein < state.protein.goal*.8) recommendation="Training is happening, but protein is behind. Fix recovery first.";
      return {sessions,completion,skipped,avgProtein,recommendation};
    }
    function buildRecommendations(session){
      const lines=[];
      session.exercises.forEach(ex=>{ if(ex.status==="skipped") lines.push(`${ex.name}: do it next time before adding weight.`); else if(ex.status==="done" && ex.difficulty==="Easy") lines.push(`${ex.name}: add 5 lbs next time if form was clean.`); else if(ex.status==="done" && ex.difficulty==="Good") lines.push(`${ex.name}: keep same weight or add 2.5 lbs.`); else if(ex.status==="done" && (ex.difficulty==="Hard" || ex.difficulty==="Too Hard")) lines.push(`${ex.name}: keep same weight next time.`); });
      if(Number(state.protein.today) < Number(state.protein.goal)*.8) lines.push("Protein is below 80% of goal. Recovery may be limited.");
      if(Number(state.dailyLog.sleep||0)<6 && Number(state.dailyLog.sleep||0)>0) lines.push("Sleep is under 6 hours. Do not increase intensity next session.");
      if(!lines.length) lines.push("Good session. Keep the same plan and progress carefully.");
      return lines;
    }
    function checkPRs(session){
      session.exercises.forEach(ex=>{ if(ex.status!=="done") return; const weight=Number(ex.weight||0); if(!weight) return; const current=state.prs[ex.name]; if(!current || weight>Number(current.weight||0)){ state.prs[ex.name]={exercise:ex.name,weight,date:session.date}; showToast(`New PR: ${ex.name} ${weight} lbs`); } });
    }
    function finishWorkout(workoutId, closeGym=false){
      const workout=getWorkout(workoutId); if(!workout.exercises.length){ showToast("Add exercises first"); return; }
      const session={id:uid(), date:new Date().toISOString(), workoutId, workoutName:workout.name, protein:state.protein.today, sleep:state.dailyLog.sleep, recovery:recoveryScore(), exercises:workout.exercises.map(ex=>{const c=getCheck(workoutId,ex.id); return {id:ex.id,name:ex.name,muscle:ex.muscle,sets:ex.sets,reps:ex.reps,targetWeight:ex.weight,weight:c.weight||ex.weight||"",difficulty:c.difficulty||"",status:c.status||"skipped"};})};
      state.history.push(session); checkPRs(session); state.checks[workoutId]={}; state.lastActiveDate=todayISO();
      if(closeGym){ state.gymMode.open=false; state.gymMode.selectedWorkoutId=null; }
      saveState(); render(); renderGym(); showFinishModal(session);
    }
    function showFinishModal(session){ const done=session.exercises.filter(e=>e.status==="done").length,total=session.exercises.length,recs=buildRecommendations(session); openModal(`<h2>Workout Saved</h2><div class="card"><h3>${escapeHtml(session.workoutName)}</h3><p>${done} of ${total} exercises completed.</p><div class="progress"><div class="bar" style="width:${total?Math.round(done/total*100):0}%"></div></div></div><h3>Next-Time Recommendations</h3>${recs.map(r=>`<div class="card tight"><p>${escapeHtml(r)}</p></div>`).join("")}<button class="primary" style="width:100%;margin-top:10px;" onclick="App.closeModal()">Done</button>`); }
    function renderWorkoutPills(activeId, onclickName){ return `<div class="pillbar">${state.workouts.map(w=>`<button class="pill ${activeId===w.id?"active":""}" onclick="${onclickName}('${w.id}')">${escapeHtml(w.name)}</button>`).join("")}</div>`; }
    function renderExerciseCards(workoutId){
      const workout=getWorkout(workoutId); if(!workout.exercises.length) return `<div class="empty">No exercises yet. Add exercises in the Plan tab.</div>`;
      return workout.exercises.map(ex=>{ const c=getCheck(workoutId,ex.id), last=lastWeightForExercise(ex.name), cardClass=c.status==="done"?"done":c.status==="skipped"?"skipped":""; return `<div class="exerciseCard ${cardClass}"><div class="exerciseTitle">${escapeHtml(ex.name)}</div><div class="exerciseSub">${escapeHtml(ex.muscle||"Muscle")} • ${ex.sets||0} × ${ex.reps||0} • Rest ${escapeHtml(ex.rest||"-")}</div><p>Last weight: <strong>${last?`${last} lbs`:"No history yet"}</strong></p><div class="field" style="margin-top:10px;"><label>Today's Weight</label><input type="number" inputmode="decimal" value="${escapeAttr(c.weight||ex.weight||"")}" placeholder="Weight in lbs" onchange="App.updateCheck('${workoutId}','${ex.id}',{weight:this.value})"/></div><div class="difficulty">${["Easy","Good","Hard","Too Hard"].map(d=>`<button class="${c.difficulty===d?"active":""}" onclick="App.updateCheck('${workoutId}','${ex.id}',{difficulty:'${d}'})">${d}</button>`).join("")}</div><div class="actions"><button class="primary smallbtn" onclick="App.updateCheck('${workoutId}','${ex.id}',{status:'done'})">Done</button><button class="secondary smallbtn" onclick="App.updateCheck('${workoutId}','${ex.id}',{status:'skipped'})">Skip</button><button class="ghost smallbtn" onclick="App.updateCheck('${workoutId}','${ex.id}',{status:'',difficulty:''})">Undo</button></div></div>`; }).join("");
    }
    function brandHtml(){ return `<div class="brand"><img class="brandIcon" src="${ICON_SRC}" alt="GymTrack Pro icon" onerror="this.outerHTML='<div class=&quot;brandIconFallback&quot;>🏋️</div>'"><div><h1>GymTrack Pro</h1><div class="date">${niceDate()}</div></div></div>`; }
    function renderHome(){
      const active=getWorkout(state.activeWorkoutId), score=recoveryScore(), proteinPct=Math.min(100,Math.round(state.protein.today/Math.max(1,state.protein.goal)*100)), streak=streakCount();
      return `<div class="topbar">${brandHtml()}<button class="primary smallbtn" onclick="App.openGymMode()">Gym Mode</button></div>${streak>=2?`<div class="card"><h3>🔥 ${streak}-Day Streak</h3><p>You have saved workouts on consecutive days.</p></div>`:""}<div class="card"><h3>Smart Tip</h3><p>${escapeHtml(smartTip())}</p></div><div class="card"><div class="row between"><h3>Recovery Score</h3><strong>${score}/100</strong></div><div class="progress"><div class="bar" style="width:${score}%"></div></div><p style="margin-top:10px;">${escapeHtml(recoveryText(score))}</p></div><div class="card"><div class="row between"><h3>Protein</h3><strong>${state.protein.today}g / ${state.protein.goal}g</strong></div><div class="progress"><div class="bar" style="width:${proteinPct}%"></div></div></div><div class="card" onclick="App.setTab('Workout')" style="cursor:pointer;"><div class="row between"><div><h3>Today's Workout</h3><p>${escapeHtml(active.name)} • ${active.exercises.length} exercises</p></div><button class="secondary smallbtn">Open</button></div></div>`;
    }
    function renderWorkout(){ const w=getWorkout(state.activeWorkoutId), pct=completionPct(w.id); return `<h2>Workout</h2>${renderWorkoutPills(state.activeWorkoutId,"App.setActiveWorkout")}<div class="card"><div class="row between"><div><h3>${escapeHtml(w.name)}</h3><p>${completedCount(w.id)} done • ${skippedCount(w.id)} skipped • ${w.exercises.length} total</p></div><strong>${pct}%</strong></div><div class="progress"><div class="bar" style="width:${pct}%"></div></div></div>${renderExerciseCards(w.id)}<button class="primary" style="width:100%;margin-top:4px;" onclick="App.finishWorkout('${w.id}',false)">Finish and Save Workout</button>`; }
    function renderPlan(){
      const w=getWorkout(state.planWorkoutId);
      return `<h2>Plan</h2>${renderWorkoutPills(state.planWorkoutId,"App.setPlanWorkout")}<div class="card"><div class="field"><label>Workout Name</label><input value="${escapeAttr(w.name)}" onchange="App.renameWorkout('${w.id}',this.value)"/></div><p>Rename Workout 1, 2, or 3. These workout slots stay permanent.</p></div><button class="primary" style="width:100%;margin-bottom:12px;" onclick="App.openAddExerciseModal()">+ Add Exercise</button>${w.exercises.length?w.exercises.map(ex=>`<div class="card tight"><div class="row between"><div><h3>${escapeHtml(ex.name)}</h3><p>${escapeHtml(ex.muscle)} • ${ex.sets} × ${ex.reps} • ${ex.weight} lbs • Rest ${escapeHtml(ex.rest)}</p></div><div class="row" style="gap:6px;"><button class="secondary iconBtn" onclick="App.openEditExerciseModal('${w.id}','${ex.id}')">✎</button><button class="ghost iconBtn" onclick="App.deleteExercise('${w.id}','${ex.id}')">✕</button></div></div></div>`).join(""):`<div class="empty">No exercises in this workout yet.</div>`}`;
    }
    function renderLog(){
      const remaining=Math.max(0,Number(state.protein.goal)-Number(state.protein.today)), proteinPct=Math.min(100,Math.round(state.protein.today/Math.max(1,state.protein.goal)*100));
      // FIX Bug 4: changed class from "grid4" (was 2-col) to "grid5" (5-col) to match the 5 quick-add buttons
      return `<h2>Log</h2><div class="card"><h3>Protein Tracker</h3><div class="bigNumber">${state.protein.today}g</div><p>Goal: ${state.protein.goal}g</p><div class="progress"><div class="bar" style="width:${proteinPct}%"></div></div><div class="grid5" style="margin-top:12px;">${[10,20,25,30,40].map(n=>`<button class="secondary smallbtn" onclick="App.addProtein(${n})">+${n}g</button>`).join("")}</div><div class="field" style="margin-top:12px;"><label>Custom Protein</label><input type="number" inputmode="numeric" placeholder="Enter grams" onchange="App.addProtein(Number(this.value));this.value='';"/></div><div class="field"><label>Daily Goal</label><input type="number" inputmode="numeric" value="${state.protein.goal}" onchange="App.setProteinGoal(this.value)"/></div><button class="ghost" style="width:100%;" onclick="App.resetProtein()">Reset Today</button><p style="margin-top:10px;">${remaining>0?`${remaining}g remaining to hit your goal.`:"Protein goal hit."}</p></div><div class="card"><h3>Daily Log</h3><div class="field"><label>Sleep Hours</label><input type="number" inputmode="decimal" value="${escapeAttr(state.dailyLog.sleep)}" onchange="App.updateLog('sleep',this.value)"/></div><div class="field"><label>Water Intake — oz</label><input type="number" inputmode="numeric" value="${escapeAttr(state.dailyLog.water)}" onchange="App.updateLog('water',this.value)"/></div><div class="field"><label>Body Weight — lbs</label><input type="number" inputmode="decimal" value="${escapeAttr(state.dailyLog.bodyWeight)}" onchange="App.updateLog('bodyWeight',this.value)"/></div><div class="field"><label>Cardio Minutes</label><input type="number" inputmode="numeric" value="${escapeAttr(state.dailyLog.cardio)}" onchange="App.updateLog('cardio',this.value)"/></div><div class="field"><label>Mood</label>
      <!-- FIX Bug 3: changed from class "difficulty" (4-col) to class "mood5" (5-col) to fit all 5 emoji buttons -->
      <div class="mood5">${["😩","😕","😐","🙂","🔥"].map(m=>`<button class="${state.dailyLog.mood===m?"active":""}" onclick="App.updateLog('mood','${m}')">${m}</button>`).join("")}</div></div></div>${renderAdvicePanel()}`;
    }
    function renderAdvicePanel(){
      const bw=Number(state.dailyLog.bodyWeight||0), sleep=Number(state.dailyLog.sleep||0), water=Number(state.dailyLog.water||0), cardio=Number(state.dailyLog.cardio||0), mood=state.dailyLog.mood;
      if(!bw && !sleep && !water && !cardio && !mood) return "";
      const proteinLow=bw?Math.round(bw):state.protein.goal, proteinHigh=bw?Math.round(bw*1.2):Math.round(state.protein.goal*1.2), proteinGap=Math.max(0,proteinLow-state.protein.today), hydrationTarget=bw?Math.round(bw/2):80, waterGap=Math.max(0,hydrationTarget-water), cardioBurn=Math.round(cardio*8);
      let sleepAdvice="Add sleep hours to get training advice."; if(sleep>0&&sleep<6)sleepAdvice="Under 6 hours: do not go heavier."; else if(sleep<7.5&&sleep>0)sleepAdvice="Decent, but do not force PRs."; else if(sleep>=8)sleepAdvice="Great sleep. Better recovery window.";
      let moodTip="Pick a mood to get a training tip."; if(mood==="😩")moodTip="Go lighter. Win with consistency."; if(mood==="😕")moodTip="Keep weight steady and focus on clean reps."; if(mood==="😐")moodTip="Normal effort. Do not overreach."; if(mood==="🙂")moodTip="Good day. Push one movement if form is strong."; if(mood==="🔥")moodTip="High-energy day. PR attempt can be reasonable.";
      return `<div class="card"><h3>Personalized Advice</h3><p>Protein target based on body weight: <strong>${proteinLow}g–${proteinHigh}g</strong></p><p>Protein gap: <strong>${proteinGap}g</strong></p><p>Hydration target: <strong>${hydrationTarget} oz</strong>. Short by <strong>${waterGap} oz</strong>.</p><p>Sleep: <strong>${escapeHtml(sleepAdvice)}</strong></p><p>Estimated cardio burn: <strong>${cardioBurn} calories</strong></p><p>Mood tip: <strong>${escapeHtml(moodTip)}</strong></p></div>`;
    }
    function renderStats(){
      const week=weeklyReview(), prList=Object.values(state.prs).sort((a,b)=>new Date(b.date)-new Date(a.date));
      return `<h2>Stats</h2><div class="grid2"><div class="card"><div class="statNumber">${state.history.length}</div><p>Total Workouts</p></div><div class="card"><div class="statNumber">🔥 ${streakCount()}</div><p>Day Streak</p></div><div class="card"><div class="statNumber">${averageProtein()}g</div><p>Average Protein</p></div><div class="card"><div class="statNumber">${sessionsThisWeek()}</div><p>Sessions This Week</p></div></div><div class="sectionTitle">Personal Records</div><div class="card">${prList.length?`<div class="badgeList">${prList.map(pr=>`<span class="badge">${escapeHtml(pr.exercise)}: ${pr.weight} lbs</span>`).join("")}</div>`:`<p>No PRs yet. Save a workout to start tracking.</p>`}</div><div class="sectionTitle">Weekly Review</div><div class="card"><p>Sessions: <strong>${week.sessions}</strong></p><p>Completion: <strong>${week.completion}%</strong></p><p>Skipped: <strong>${week.skipped}</strong></p><p>Avg Protein: <strong>${week.avgProtein}g/day</strong></p><p style="margin-top:10px;">${escapeHtml(week.recommendation)}</p></div><div class="sectionTitle">Workout History</div>${state.history.length?[...state.history].reverse().map(h=>`<div class="historyItem" onclick="App.openHistory('${h.id}')"><div class="row between"><div><h3>${escapeHtml(h.workoutName)}</h3><p>${new Date(h.date).toLocaleString()} • Recovery ${h.recovery}/100</p></div><button class="secondary smallbtn">View</button></div></div>`).join(""):`<div class="empty">No workout history yet.</div>`}`;
    }
    function renderNav(){ const tabs=["Home","Workout","Plan","Log","Stats"]; return `<div class="nav">${tabs.map(t=>`<button class="${state.activeTab===t?"active":""}" onclick="App.setTab('${t}')">${t}</button>`).join("")}</div>`; }
    function render(){ resetDailyIfNeeded(); let content=""; if(state.activeTab==="Home")content=renderHome(); if(state.activeTab==="Workout")content=renderWorkout(); if(state.activeTab==="Plan")content=renderPlan(); if(state.activeTab==="Log")content=renderLog(); if(state.activeTab==="Stats")content=renderStats(); document.getElementById("app").innerHTML=content+renderNav(); }
    function renderGym(){
      const overlay=document.getElementById("gymOverlay"), inner=document.getElementById("gymInner");
      if(!state.gymMode.open){ overlay.classList.remove("show"); inner.innerHTML=""; return; }
      overlay.classList.add("show");
      if(!state.gymMode.selectedWorkoutId){ inner.innerHTML=`<div style="padding-top:48px;"><h1>Gym Mode</h1><p style="margin:6px 0 18px;">Choose a workout.</p>${state.workouts.map(w=>`<div class="workoutPickerCard" onclick="App.selectGymWorkout('${w.id}')"><h2>${escapeHtml(w.name)}</h2><p>${w.exercises.length} exercises</p><p>${escapeHtml(musclesForWorkout(w))}</p></div>`).join("")}</div>`; return; }
      const w=getWorkout(state.gymMode.selectedWorkoutId), pct=completionPct(w.id);
      inner.innerHTML=`<div style="padding-top:48px;"><h1>${escapeHtml(w.name)}</h1><p style="margin:6px 0 12px;">${completedCount(w.id)} done • ${w.exercises.length} total</p><div class="progress" style="margin-bottom:12px;"><div class="bar" style="width:${pct}%"></div></div><button class="secondary" style="width:100%;margin-bottom:12px;" onclick="App.changeGymWorkout()">← Change Workout</button>${renderExerciseCards(w.id)}<button class="primary" style="width:100%;margin-top:6px;" onclick="App.finishWorkout('${w.id}',true)">Finish Workout</button></div>`;
    }
    function openModal(html){ document.getElementById("modal").innerHTML=html; document.getElementById("modalBackdrop").classList.add("show"); }
    function closeModal(){ document.getElementById("modalBackdrop").classList.remove("show"); document.getElementById("modal").innerHTML=""; }
    document.getElementById("modalBackdrop").addEventListener("click", e=>{ if(e.target.id==="modalBackdrop") closeModal(); });
    function openAddExerciseModal(){ const w=getWorkout(state.planWorkoutId); openModal(`<h2>Add Exercise</h2><div class="field"><label>Exercise Name</label><input id="exName" placeholder="Example: Bench Press"/></div><div class="field"><label>Muscle Group</label><input id="exMuscle" placeholder="Example: Chest"/></div><div class="field"><label>Workout</label><select id="exWorkout">${state.workouts.map(x=>`<option value="${x.id}" ${x.id===w.id?"selected":""}>${escapeHtml(x.name)}</option>`).join("")}</select></div><div class="grid2"><div class="field"><label>Sets</label><input id="exSets" type="number" value="3"/></div><div class="field"><label>Reps</label><input id="exReps" type="number" value="10"/></div></div><div class="grid2"><div class="field"><label>Weight</label><input id="exWeight" type="number" value="0"/></div><div class="field"><label>Rest</label><input id="exRest" value="60 sec"/></div></div><div class="grid2"><button class="ghost" onclick="App.closeModal()">Cancel</button><button class="primary" onclick="App.saveNewExercise()">Save</button></div>`); }
    function saveNewExercise(){ const name=document.getElementById("exName").value.trim(), muscle=document.getElementById("exMuscle").value.trim(), workoutId=document.getElementById("exWorkout").value, sets=Number(document.getElementById("exSets").value||0), reps=Number(document.getElementById("exReps").value||0), weight=Number(document.getElementById("exWeight").value||0), rest=document.getElementById("exRest").value.trim(); if(!name){showToast("Exercise name required"); return;} const w=getWorkout(workoutId); w.exercises.push({id:uid(),name,muscle,sets,reps,weight,rest}); state.planWorkoutId=workoutId; saveState(); closeModal(); render(); }
    function openEditExerciseModal(workoutId, exerciseId){ const w=getWorkout(workoutId), ex=w.exercises.find(e=>e.id===exerciseId); if(!ex)return; openModal(`<h2>Edit Exercise</h2><div class="field"><label>Exercise Name</label><input id="editName" value="${escapeAttr(ex.name)}"/></div><div class="field"><label>Muscle Group</label><input id="editMuscle" value="${escapeAttr(ex.muscle)}"/></div><div class="grid2"><div class="field"><label>Sets</label><input id="editSets" type="number" value="${escapeAttr(ex.sets)}"/></div><div class="field"><label>Reps</label><input id="editReps" type="number" value="${escapeAttr(ex.reps)}"/></div></div><div class="grid2"><div class="field"><label>Weight</label><input id="editWeight" type="number" value="${escapeAttr(ex.weight)}"/></div><div class="field"><label>Rest</label><input id="editRest" value="${escapeAttr(ex.rest)}"/></div></div><div class="grid2"><button class="ghost" onclick="App.closeModal()">Cancel</button><button class="primary" onclick="App.saveEditedExercise('${workoutId}','${exerciseId}')">Save</button></div>`); }
    // FIX Bug 2: added renderGym() so edits immediately reflect in Gym Mode overlay
    function saveEditedExercise(workoutId, exerciseId){ const w=getWorkout(workoutId), ex=w.exercises.find(e=>e.id===exerciseId); if(!ex)return; ex.name=document.getElementById("editName").value.trim()||ex.name; ex.muscle=document.getElementById("editMuscle").value.trim(); ex.sets=Number(document.getElementById("editSets").value||0); ex.reps=Number(document.getElementById("editReps").value||0); ex.weight=Number(document.getElementById("editWeight").value||0); ex.rest=document.getElementById("editRest").value.trim(); saveState(); closeModal(); render(); renderGym(); }
    // FIX Bug 1: added renderGym() so deletions immediately reflect in Gym Mode overlay
    function deleteExercise(workoutId, exerciseId){ const w=getWorkout(workoutId); w.exercises=w.exercises.filter(e=>e.id!==exerciseId); if(state.checks[workoutId]) delete state.checks[workoutId][exerciseId]; saveState(); render(); renderGym(); }
    function openHistory(id){ const h=state.history.find(x=>x.id===id); if(!h)return; openModal(`<h2>${escapeHtml(h.workoutName)}</h2><p>${new Date(h.date).toLocaleString()}</p><div class="card"><p>Protein: <strong>${h.protein||0}g</strong></p><p>Sleep: <strong>${h.sleep||"-"} hrs</strong></p><p>Recovery: <strong>${h.recovery||0}/100</strong></p></div>${h.exercises.map(ex=>`<div class="card tight"><h3>${escapeHtml(ex.name)}</h3><p>${escapeHtml(ex.muscle)} • ${ex.sets} × ${ex.reps}</p><p>Weight used: <strong>${ex.weight||"-"} lbs</strong></p><p>Difficulty: <strong>${escapeHtml(ex.difficulty||"-")}</strong></p><p>Status: <strong>${escapeHtml(ex.status)}</strong></p></div>`).join("")}<button class="primary" style="width:100%;margin-top:10px;" onclick="App.closeModal()">Close</button>`); }
    function showToast(message){ const toast=document.getElementById("toast"); toast.textContent=message; toast.classList.add("show"); setTimeout(()=>toast.classList.remove("show"),2200); }
    function escapeHtml(str){ return String(str??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
    function escapeAttr(str){ return escapeHtml(str); }
    const App={ setTab(tab){state.activeTab=tab;saveState();render();}, setActiveWorkout(id){state.activeWorkoutId=id;saveState();render();}, setPlanWorkout(id){state.planWorkoutId=id;saveState();render();}, renameWorkout(id,name){const w=getWorkout(id);w.name=name.trim()||w.name;saveState();render();renderGym();}, updateCheck(workoutId,exerciseId,patch){setCheck(workoutId,exerciseId,patch);}, addProtein(amount){amount=Number(amount||0);if(!amount||amount<0)return;state.protein.today=Number(state.protein.today||0)+amount;saveState();render();}, setProteinGoal(value){state.protein.goal=Math.max(1,Number(value||1));saveState();render();}, resetProtein(){state.protein.today=0;saveState();render();}, updateLog(field,value){state.dailyLog[field]=value;saveState();render();}, openAddExerciseModal, saveNewExercise, openEditExerciseModal, saveEditedExercise, deleteExercise, openHistory, finishWorkout, openGymMode(){state.gymMode.open=true;state.gymMode.selectedWorkoutId=null;saveState();renderGym();}, closeGymMode(){state.gymMode.open=false;state.gymMode.selectedWorkoutId=null;saveState();renderGym();}, selectGymWorkout(id){state.gymMode.selectedWorkoutId=id;saveState();renderGym();}, changeGymWorkout(){state.gymMode.selectedWorkoutId=null;saveState();renderGym();}, closeModal };
    window.App=App; render(); renderGym();
  </script>
</body>
</html>
